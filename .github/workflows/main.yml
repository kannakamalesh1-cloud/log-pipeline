name: 🚀 AI Log Analyzer Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  log-analysis:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # Debug Files (IMPORTANT)
      # =========================
      - name: 🔍 Debug Files
        run: |
          echo "Current directory:"
          pwd
          echo "Repository structure:"
          ls -R

      # =========================
      # Setup Python
      # =========================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Install Dependencies
      # =========================
      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # Fix Script Permission
      # =========================
      - name: 🔧 Set Script Permission
        run: chmod +x scripts/log-analyser.sh

      # =========================
      # Build Docker Image
      # =========================
      - name: 🐳 Build Docker Image
        run: docker build -t myapp .

      # =========================
      # Run Container
      # =========================
      - name: 🚀 Run Container
        run: |
          docker run -d --name test-container myapp
          sleep 5

      # =========================
      # Collect Logs
      # =========================
      - name: 📜 Collect Logs
        run: |
          docker logs test-container > app.log
          echo "===== LOG OUTPUT ====="
          cat app.log

      # =========================
      # Run Log Analyzer Script
      # =========================
      - name: 🧠 Run Log Analyzer Script
        env:
          LOG_FILE: app.log
        run: ./scripts/log-analyser.sh

      # =========================
      # Cleanup (Always Runs)
      # =========================
      - name: 🧹 Cleanup Container
        if: always()
        run: docker rm -f test-container
